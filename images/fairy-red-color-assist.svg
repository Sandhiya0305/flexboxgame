<?xml version="1.0" encoding="UTF-8"?>
<svg width="210px" height="155px" viewBox="0 0 210 155" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>fairy-red</title>
    <desc>Fairy character in red with colorblind assist</desc>
    <defs>
        <linearGradient id="wingGradientRedCB" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:0.8" />
            <stop offset="100%" style="stop-color:#DC143C;stop-opacity:0.6" />
        </linearGradient>
    </defs>
    <g transform="translate(0, 15)">
        <!-- Left Wing -->
        <ellipse cx="60" cy="75" rx="45" ry="55" fill="url(#wingGradientRedCB)" transform="rotate(-20, 60, 75)" />
        <ellipse cx="55" cy="70" rx="30" ry="35" fill="url(#wingGradientRedCB)" transform="rotate(-15, 55, 70)" opacity="0.7" />
        
        <!-- Right Wing -->
        <ellipse cx="150" cy="75" rx="45" ry="55" fill="url(#wingGradientRedCB)" transform="rotate(20, 150, 75)" />
        <ellipse cx="155" cy="70" rx="30" ry="35" fill="url(#wingGradientRedCB)" transform="rotate(15, 155, 70)" opacity="0.7" />
        
        <!-- Body -->
        <ellipse cx="105" cy="95" rx="25" ry="32" fill="#EE302D" />
        
        <!-- Head -->
        <circle cx="105" cy="50" r="26" fill="#F66A68" />
        
        <!-- Eyes -->
        <circle cx="95" cy="45" r="7" fill="#FFFFFF" />
        <circle cx="115" cy="45" r="7" fill="#FFFFFF" />
        <circle cx="95" cy="45" r="4" fill="#000000" />
        <circle cx="115" cy="45" r="4" fill="#000000" />
        
        <!-- Smile -->
        <path d="M 95 60 Q 105 70 115 60" stroke="#DC143C" stroke-width="3" fill="none" />
        
        <!-- Antenna -->
        <line x1="95" y1="25" x2="85" y2="12" stroke="#EE302D" stroke-width="3" />
        <circle cx="85" cy="12" r="5" fill="#F66A68" />
        <line x1="115" y1="25" x2="125" y2="12" stroke="#EE302D" stroke-width="3" />
        <circle cx="125" cy="12" r="5" fill="#F66A68" />
        
        <!-- Colorblind Assist: Square symbol -->
        <rect x="90" y="80" width="30" height="30" fill="none" stroke="#FFFFFF" stroke-width="3" />
        
        <!-- Sparkles -->
        <circle cx="50" cy="45" r="3" fill="#FFFF00" opacity="0.8" />
        <circle cx="160" cy="45" r="3" fill="#FFFF00" opacity="0.8" />
        <circle cx="40" cy="95" r="2" fill="#FFFF00" opacity="0.6" />
        <circle cx="170" cy="95" r="2" fill="#FFFF00" opacity="0.6" />
    </g>
</svg>
