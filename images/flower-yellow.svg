<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="160px" height="160px" viewBox="0 0 160 160" preserveAspectRatio="none" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>flower-yellow</title>
    <desc>Flower platform in yellow</desc>
    <defs>
        <linearGradient id="petalGradientYellow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
        </linearGradient>
    </defs>
    <g transform="translate(0, 0)">
        <!-- Petals -->
        <ellipse cx="80" cy="30" rx="25" ry="30" fill="url(#petalGradientYellow)" transform="rotate(0, 80, 80)" />
        <ellipse cx="80" cy="30" rx="25" ry="30" fill="url(#petalGradientYellow)" transform="rotate(60, 80, 80)" />
        <ellipse cx="80" cy="30" rx="25" ry="30" fill="url(#petalGradientYellow)" transform="rotate(120, 80, 80)" />
        <ellipse cx="80" cy="30" rx="25" ry="30" fill="url(#petalGradientYellow)" transform="rotate(180, 80, 80)" />
        <ellipse cx="80" cy="30" rx="25" ry="30" fill="url(#petalGradientYellow)" transform="rotate(240, 80, 80)" />
        <ellipse cx="80" cy="30" rx="25" ry="30" fill="url(#petalGradientYellow)" transform="rotate(300, 80, 80)" />
        
        <!-- Center -->
        <circle cx="80" cy="80" r="30" fill="#FFA500" />
        <circle cx="80" cy="80" r="20" fill="#FF8C00" />
        
        <!-- Sparkles -->
        <circle cx="40" cy="40" r="3" fill="#FFFFFF" opacity="0.8" />
        <circle cx="120" cy="40" r="3" fill="#FFFFFF" opacity="0.8" />
        <circle cx="40" cy="120" r="3" fill="#FFFFFF" opacity="0.8" />
        <circle cx="120" cy="120" r="3" fill="#FFFFFF" opacity="0.8" />
    </g>
</svg>
